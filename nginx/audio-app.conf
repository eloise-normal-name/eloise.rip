server {
    listen __NGINX_PORT__;
    server_name localhost;

    # Increase for large audio file uploads (adjust as needed)
    client_max_body_size 500M;

    # scripts/start-content-manager.ps1 starts nginx for the active checkout.
    location /static/ {
        alias __PROJECT_ROOT__/output/static/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Proxy app routes to Flask/Waitress
    location / {
        proxy_pass         http://__LISTEN_HOST__:__APP_PORT__;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Forward Cloudflare Access verified email header
        proxy_set_header   Cf-Access-Authenticated-User-Email $http_cf_access_authenticated_user_email;

        # Increase timeouts for slower uploads
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
